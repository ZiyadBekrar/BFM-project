<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer on GitHub Pages</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        iframe {
            width: 80%;
            height: 600px;
            border: 1px solid #ccc;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            background-color: #007bff;
            padding: 10px 20px;
            border-radius: 5px;
        }
        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>View My PDF</h1>
    <!-- Embed PDF in an iframe -->
    <iframe src="BFM project.pdf"></iframe>

    <!-- Direct download link -->
    <p><a href="BFM project.pdf" download>Download PDF</a></p>
</body>
</html>
